<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />

    <title>
      Frontend Mentor | Newsletter sign-up form with success message
    </title>
  </head>
  <body>
    <main class="card">
      <!-- Container -->
      <div class="ilustration">
        <picture>
          <source
            media="(max-width: 39.937rem)"
            srcset="assets/images/illustration-sign-up-mobile.svg"
          />
          <source
            media="(max-width: 74.938rem)"
            srcset="assets/images/illustration-sign-up-tablet.svg"
          />
          <img
            src="assets/images/illustration-sign-up-desktop.svg"
            alt="ilustration"
          />
        </picture>
      </div>
      <!-- Content -->
      <div class="cont-info">
        <div class="content">
          <h1>Stay updated!</h1>
          <p>Join 60,000+ product managers receiving monthly updates on:</p>
          <ul>
            <li>
              <img src="assets/images/icon-list.svg" alt="List icon" /><span
                >Product discovery and building what matters</span
              >
            </li>
            <li>
              <img src="assets/images/icon-list.svg" alt="List icon" /><span
                >Measuring to ensure updates are a success</span
              >
            </li>
            <li>
              <img src="assets/images/icon-list.svg" alt="List icon" /><span
                >And much more!</span
              >
            </li>
          </ul>
        </div>
        <!-- Info -->
        <form class="info">
          <div class="label-message">
            <label for="email" class="form-label">Email address</label>
            <span class="error-message"></span>
          </div>
          <input
            type="email"
            name="email"
            id="email"
            placeholder="email@company.com"
            required
          />
          <button type="submit" id="btn-subscribe">Subscribe to monthly newsletter</button>
        </form>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
